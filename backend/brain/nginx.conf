# Combined-container front-door router.
# Listens on 3001 (App Runner external port).
# Routes by Host header:
#   api.<heru>.com       → localhost:3002 (Node)
#   brain-api.<heru>.com → localhost:8080 (Python brain)
# Default fallback for direct App Runner default-domain probing → 3002 (Node).

worker_processes 1;
# daemon directive intentionally NOT set here — supervisord passes -g "daemon off;"
# Setting it twice causes: emerg: "daemon" directive is duplicate

events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging to /tmp (non-root container user has write access)
  access_log /tmp/logs/nginx-access.log;
  error_log  /tmp/logs/nginx-error.log;

  client_body_temp_path /tmp/nginx-client-body;
  proxy_temp_path       /tmp/nginx-proxy;
  fastcgi_temp_path     /tmp/nginx-fastcgi;
  uwsgi_temp_path       /tmp/nginx-uwsgi;
  scgi_temp_path        /tmp/nginx-scgi;

  client_max_body_size 25M;
  proxy_read_timeout 120s;
  proxy_connect_timeout 30s;
  proxy_buffering off;

  # ── api.<heru>.com → Node backend ───────────────────────────────────────
  server {
    listen 3001;
    server_name api.claracode.ai api.claraagents.com api.*.dev api.*;

    # Response header — proves this server block matched (visible in client curl -I)
    add_header X-Served-By "node-backend" always;

    location / {
      proxy_pass http://127.0.0.1:3002;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ── brain-api.<heru>.com → Python brain ─────────────────────────────────
  server {
    listen 3001;
    server_name brain-api.claracode.ai brain-api.claraagents.com brain-api.*;

    add_header X-Served-By "python-brain" always;

    location / {
      proxy_pass http://127.0.0.1:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ── Default (App Runner default domain probes, /health checks, etc.) ───
  # Falls through to Node so existing /health endpoint still works for ALB target health
  server {
    listen 3001 default_server;
    server_name _;

    add_header X-Served-By "default-route" always;

    location / {
      proxy_pass http://127.0.0.1:3002;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
