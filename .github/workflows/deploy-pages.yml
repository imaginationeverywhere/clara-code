# OpenNext targets Cloudflare Workers (`wrangler deploy`), not Pages (`wrangler pages deploy`).
# The worker.js imports sibling modules from .open-next/ that wrangler pages deploy strips out.
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy claracode.ai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm (bypass lockfile bug)
        run: |
          echo "package-lock=false" >> .npmrc
          echo "legacy-peer-deps=true" >> .npmrc
          echo "ignore-scripts=true" >> .npmrc

      - name: Build surface-scripts dependency
        run: |
          npm install -g typescript
          npx tsc -p packages/clara-code-surface-scripts/tsconfig.build.json

      - name: Install all workspace dependencies
        run: npm install

      - name: Build with OpenNext (Cloudflare)
        run: cd frontend && npx @opennextjs/cloudflare build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Cloudflare Workers
        run: |
          cd frontend
          if [ "${{ github.ref_name }}" = "main" ] && [ "${{ github.event_name }}" = "push" ]; then
            npx opennextjs-cloudflare deploy --env production
          else
            npx opennextjs-cloudflare deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4682eae9d50da54644c8f895ddad984f
