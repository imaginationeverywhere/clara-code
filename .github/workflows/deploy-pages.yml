name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy claracode.ai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm (bypass lockfile bug)
        run: |
          echo "package-lock=false" >> .npmrc
          echo "legacy-peer-deps=true" >> .npmrc
          echo "ignore-scripts=true" >> .npmrc

      - name: Build surface-scripts dependency
        run: |
          npm install -g typescript
          npx tsc -p packages/clara-code-surface-scripts/tsconfig.build.json

      - name: Install all workspace dependencies
        run: npm install

      - name: Build with next-on-pages
        run: npx @cloudflare/next-on-pages
        working-directory: frontend
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy frontend/.vercel/output/static --project-name clara-code --branch ${{ github.ref_name }} --commit-hash ${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4682eae9d50da54644c8f895ddad984f
