name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy claracode.ai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build surface-scripts dependency
        run: |
          npm install -g typescript
          npx tsc -p packages/clara-code-surface-scripts/tsconfig.build.json

      - name: Install web-ui dependencies
        working-directory: packages/web-ui
        run: npm install --no-package-lock --legacy-peer-deps --ignore-scripts

      - name: Build with next-on-pages
        working-directory: packages/web-ui
        run: npx @cloudflare/next-on-pages
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: 4682eae9d50da54644c8f895ddad984f
          projectName: clara-code
          directory: packages/web-ui/.vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          wranglerVersion: '3'
