name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy claracode.ai
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pin npm to v9
        run: npm install -g npm@9

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build local workspace dep
        working-directory: packages/clara-code-surface-scripts
        run: |
          if npm run build; then
            echo "Build script succeeded"
          else
            npx tsc -p tsconfig.build.json
          fi

      - name: Build with next-on-pages
        working-directory: packages/web-ui
        run: npx @cloudflare/next-on-pages
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}
          accountId: 4682eae9d50da54644c8f895ddad984f
          projectName: clara-code
          directory: packages/web-ui/.vercel/output/static
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          wranglerVersion: '3'
