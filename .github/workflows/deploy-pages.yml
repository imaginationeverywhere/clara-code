# Deployment handled by Cloudflare Workers Builds (Git Integration).
# No GitHub secrets needed — CF connects directly to this repo via the dashboard.
#
# Setup (one-time, in CF dashboard):
#   Workers & Pages → Create → Connect to Git → select imaginationeverywhere/clara-code
#   Build command:  npm install --ignore-scripts && npx tsc -p packages/clara-code-surface-scripts/tsconfig.build.json && npm install && cd frontend && npx @opennextjs/cloudflare build
#   Root directory: / (repo root)
#   Branch:         develop (preview) / main (production)
#   Environment variables (set in CF dashboard, not GH secrets):
#     NODE_ENV=production
#     NEXT_TELEMETRY_DISABLED=1
#
# This file is intentionally a no-op. Delete or re-enable if switching back to GH Actions.
name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: true

jobs:
  noop:
    name: Workers Builds handles deployment
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: |
          echo "Deployment is handled by Cloudflare Workers Builds (Git Integration)."
          echo "No action needed here. Configure in the CF dashboard."
          echo "See comment at top of this file for setup instructions."
