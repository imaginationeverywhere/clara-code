# v*.*.* → npm publish (clara + clara-voice-client) + Tauri .dmg (macOS) + .AppImage (Linux) + GitHub Release assets.
# Website production: Cloudflare Workers Builds (see deploy-pages.yml) — not duplicated in this workflow.
# Distribution: npm install -g clara@latest → first run gates on token from claracode.ai; subscription = auth, not path.

name: Release on tag

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build voice client
        run: pnpm -C packages/clara-voice-client run build

      - name: Build clara CLI
        run: pnpm -C packages/cli run build

      - name: Verify customer brain ship gate (CLI)
        run: node scripts/verify-customer-brain-ship.mjs

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN not set — skipping npm publish (add repo secret to enable)"
            exit 0
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
          pnpm --filter @imaginationeverywhere/clara-voice-client publish --access public --no-git-checks
          pnpm --filter clara publish --access public --no-git-checks

  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1e80f3fd79adfb34ff8149ff434c7ae99f0f91d4
        with:
          toolchain: stable

      - name: Build clara-voice-client, desktop, Tauri
        run: |
          set -euo pipefail
          cd packages/clara-voice-client
          npm install
          npm run build
          cd ../../desktop
          npm ci
          npm run build

      - name: List dmg
        shell: bash
        run: find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -print -exec ls -la {} \;

      - name: Upload .dmg (artifact)
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1
        with:
          name: clara-code-macos-tagged
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: GitHub Release (attach .dmg)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Linux desktop build — AppImage attached to the same tag release.
  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install system deps (Tauri on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1e80f3fd79adfb34ff8149ff434c7ae99f0f91d4
        with:
          toolchain: stable

      - name: Build clara-voice-client, desktop, Tauri
        run: |
          set -euo pipefail
          cd packages/clara-voice-client
          npm install
          npm run build
          cd ../../desktop
          npm ci
          npm run build

      - name: List AppImage
        run: find desktop/src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -exec ls -la {} \; 2>/dev/null || true

      - name: GitHub Release (attach .AppImage)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
