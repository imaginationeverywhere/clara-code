# v*.*.* → Tauri .dmg + GitHub Release assets only.
# CLI and voice-client are NOT published to npm — distribution is gated post-checkout via claracode.ai.
# See docs/distribution-pipeline.md for subscriber delivery (curl script / dashboard download).

name: Release on tag

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1e80f3fd79adfb34ff8149ff434c7ae99f0f91d4
        with:
          toolchain: stable

      - name: Build clara-voice-client, desktop, Tauri
        run: |
          set -euo pipefail
          cd packages/clara-voice-client
          npm install
          npm run build
          cd ../../desktop
          npm ci
          npm run build

      - name: List dmg
        shell: bash
        run: find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -print -exec ls -la {} \;

      - name: Upload .dmg (artifact)
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1
        with:
          name: clara-code-macos-tagged
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: GitHub Release (attach .dmg)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
