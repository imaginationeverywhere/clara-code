name: Deploy clara-code Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/mom/**'
      - 'packages/ai/**'
      - 'packages/agent/**'
      - 'packages/coding-agent/**'
      - 'Dockerfile.backend'
      - '.github/workflows/deploy-backend.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: develop
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-clara-code
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.backend -t $ECR_REGISTRY/clara-code-backend:$IMAGE_TAG -t $ECR_REGISTRY/clara-code-backend:develop .
          docker push $ECR_REGISTRY/clara-code-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/clara-code-backend:develop

      - name: Deploy to ECS Dev
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER_DEV }} \
            --service clara-code-backend-dev \
            --force-new-deployment \
            --region us-east-1

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-clara-code
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.backend -t $ECR_REGISTRY/clara-code-backend:$IMAGE_TAG -t $ECR_REGISTRY/clara-code-backend:latest .
          docker push $ECR_REGISTRY/clara-code-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/clara-code-backend:latest

      - name: Deploy to ECS Prod
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER_PROD }} \
            --service clara-code-backend-prod \
            --force-new-deployment \
            --region us-east-1
