# CI: shared install + build, then check vs test in parallel (max-parallel: 2).
# Aligns with ci-cd-pipeline-standard: matrix jobs, explicit concurrency cap.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check-test:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: [check, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit CLI IP (founder strings)
        if: matrix.target == 'check'
        run: npm run audit:cli-ip

      - name: Build
        run: npm run build

      - name: Check
        if: matrix.target == 'check'
        run: npm run check

      - name: Test
        if: matrix.target == 'test'
        run: npm test

  # Single check name for branch rules; fails if any matrix leg failed.
  ci:
    name: ci
    needs: [build-check-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Enforce all matrix jobs succeeded
        run: |
          if [ "${{ needs.build-check-test.result }}" != "success" ]; then
            echo "::error::Check or test job failed"
            exit 1
          fi
          echo "All matrix jobs passed."
