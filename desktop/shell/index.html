<!DOCTYPE html>
<html lang="en" data-clara-desktop-shell>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clara Code</title>
  <!-- Set your voice service base (same as CLARA_VOICE_URL for CLI) before building for production, or use a local Tauri init script. -->
  <meta name="clara-voice-base" content="https://api.claracode.ai/api" />
  <meta name="clara-voice-api-key" content="" />
  <style>
    :root {
      --bg: #0A0A0A;
      --card: #151515;
      --border: #1A2A2E;
      --clara-blue: #7BC8D8;
      --text: #FFFFFF;
      --muted: #888888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .titlebar {
      height: 40px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 80px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .titlebar-lights {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 8px;
      color: #555;
      letter-spacing: 0.2em;
    }
    .titlebar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
    }
    .titlebar-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
    }
    .shell-canvas {
      flex: 1;
      display: flex;
      flex-direction: row;
      min-height: 0;
      min-width: 0;
    }
    .shell-workspace {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 24px;
      gap: 12px;
      background: #0C0C0C;
    }
    .shell-workspace h1 {
      font-size: 14px;
      font-weight: 600;
      color: #ccc;
    }
    .editor-placeholder {
      flex: 1;
      border: 1px dashed var(--border);
      border-radius: 8px;
      min-height: 200px;
      color: var(--muted);
      font-size: 13px;
      padding: 16px;
      -webkit-app-region: no-drag;
    }
    .clara-voice {
      width: 400px;
      min-width: 300px;
      max-width: min(100vw, 480px);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--bg);
      -webkit-app-region: no-drag;
    }
    .clara-voice__header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
    }
    .clara-voice__messages {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }
    .clara-voice-msg { line-height: 1.45; }
    .clara-voice-msg--user { color: #a8d4de; }
    .clara-voice-msg--clara { color: #f0f0f0; }
    .clara-voice__controls {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .mic-container {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mic-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--clara-blue);
      opacity: 0.15;
      animation: ping 3s ease-in-out infinite;
    }
    .mic-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--clara-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 0 40px rgba(123,200,216,0.2);
      position: relative;
      z-index: 1;
      -webkit-app-region: no-drag;
    }
    .mic-circle:hover { transform: scale(1.05); }
    .mic-circle.listening {
      animation: pulse 1s ease-in-out infinite;
      background: linear-gradient(135deg, var(--clara-blue), #A8DDE8);
    }
    .mic-icon { width: 32px; height: 32px; color: #0A0A0A; }
    @keyframes ping {
      0%, 100% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.1); opacity: 0.05; }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(123,200,216,0.4); }
      50% { box-shadow: 0 0 50px rgba(123,200,216,0.6); }
    }
    .clara-voice__status {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    .clara-voice__status.speaking { color: var(--clara-blue); }
    .clara-voice__input-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .clara-voice__input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .clara-voice__input:focus { border-color: var(--clara-blue); }
    .clara-voice__send {
      background: linear-gradient(135deg, var(--clara-blue), #A8DDE8);
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      color: #0A0A0A;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region>
    <span class="titlebar-lights" aria-hidden="true">&#9679; &#9679; &#9679;</span>
    <span class="titlebar-center">Clara</span>
    <span class="titlebar-status"><span class="status-dot" aria-hidden="true"></span> Online</span>
  </div>

  <div class="shell-canvas">
    <div class="shell-workspace" aria-label="Editor workspace (placeholder)">
      <h1>Workspace</h1>
      <p class="editor-placeholder">Editor area. Open a folder in a future build; voice lives in the Clara column.</p>
    </div>

    <section class="clara-voice" id="clara-voice" aria-label="Clara voice panel">
      <div class="clara-voice__header">Clara</div>
      <div class="clara-voice__messages" id="clara-messages"></div>
      <div class="clara-voice__controls">
        <p class="clara-voice__status" id="clara-status" aria-live="polite">Starting…</p>
        <div class="mic-container" aria-label="Push to talk control">
          <div class="mic-ring" id="clara-mic-ring" aria-hidden="true"></div>
          <button type="button" class="mic-circle" id="clara-mic" aria-pressed="false" aria-label="Start or stop recording; click twice: record then send">
            <svg class="mic-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
            </svg>
          </button>
        </div>
        <div class="clara-voice__input-row">
          <input class="clara-voice__input" id="clara-text" type="text" placeholder="Type a message" autocomplete="off" />
          <button type="button" class="clara-voice__send" id="clara-send">Send</button>
        </div>
      </div>
    </section>
  </div>

  <script src="voice-converse-bundled.js" defer></script>
</body>
</html>
