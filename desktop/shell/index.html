<!DOCTYPE html>
<html lang="en" data-clara-desktop-shell>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clara Code</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --card: #151515;
      --border: #1A2A2E;
      --clara-blue: #7BC8D8;
      --text: #FFFFFF;
      --muted: #888888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .titlebar {
      height: 40px;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 0 80px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .titlebar-lights {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 8px;
      color: #555;
      letter-spacing: 0.2em;
    }
    .titlebar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
    }
    .titlebar-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 32px;
      overflow: auto;
    }
    .mic-container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mic-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--clara-blue);
      opacity: 0.15;
      animation: ping 3s ease-in-out infinite;
    }
    .mic-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: var(--clara-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 0 60px rgba(123,200,216,0.2);
      position: relative;
      z-index: 1;
    }
    .mic-circle:hover { transform: scale(1.05); }
    .mic-circle.listening {
      animation: pulse 1s ease-in-out infinite;
      background: linear-gradient(135deg, var(--clara-blue), #A8DDE8);
    }
    .mic-icon { width: 64px; height: 64px; color: #0A0A0A; }
    @keyframes ping {
      0%, 100% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.2); opacity: 0.05; }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(123,200,216,0.4); }
      50% { box-shadow: 0 0 80px rgba(123,200,216,0.6); }
    }
    .status-text {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    .status-text.listening { color: var(--clara-blue); }
    .input-area {
      width: 100%;
      max-width: 600px;
      display: flex;
      gap: 8px;
    }
    .text-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--clara-blue); }
    .text-input::placeholder { color: var(--muted); }
    .send-btn {
      background: linear-gradient(135deg, var(--clara-blue), #A8DDE8);
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      color: #0A0A0A;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s;
      -webkit-app-region: no-drag;
    }
    .send-btn:hover { transform: scale(1.03); }
    .mic-circle { -webkit-app-region: no-drag; }
    .text-input { -webkit-app-region: no-drag; }
    .recent {
      width: 100%;
      max-width: 600px;
    }
    .recent-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .recent-item {
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color 0.2s;
      -webkit-app-region: no-drag;
    }
    .recent-item:hover { border-color: var(--clara-blue); color: var(--text); }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region>
    <span class="titlebar-lights" aria-hidden="true">&#9679; &#9679; &#9679;</span>
    <span class="titlebar-center">Clara</span>
    <span class="titlebar-status"><span class="status-dot" aria-hidden="true"></span> Online</span>
  </div>

  <div class="main">
    <div class="mic-container">
      <div class="mic-ring" id="micRing"></div>
      <button type="button" class="mic-circle" id="micCircle" aria-label="Toggle listening">
        <svg class="mic-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
        </svg>
      </button>
    </div>

    <p class="status-text" id="statusText">Clara is ready</p>

    <div class="input-area">
      <input type="text" class="text-input" id="messageInput"
             placeholder="Say something or type here..."
             autocomplete="off"/>
      <button type="button" class="send-btn" id="sendBtn">Send</button>
    </div>

    <div class="recent">
      <div class="recent-label">Recent</div>
      <div class="recent-item">"What's on my schedule today?" — 2 min ago</div>
      <div class="recent-item">"Draft an email to the team" — 15 min ago</div>
      <div class="recent-item">"Remind me about the QCR launch at 3pm" — 1 hr ago</div>
    </div>
  </div>

  <script>
    let isListening = false;

    function toggleListening() {
      isListening = !isListening;
      const circle = document.getElementById('micCircle');
      const status = document.getElementById('statusText');
      if (!circle || !status) return;
      if (isListening) {
        circle.classList.add('listening');
        status.textContent = 'Clara is listening...';
        status.classList.add('listening');
        window.setTimeout(() => { if (isListening) toggleListening(); }, 8000);
      } else {
        circle.classList.remove('listening');
        status.textContent = 'Clara is ready';
        status.classList.remove('listening');
      }
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      console.log('Sending message:', text);
      input.value = '';
    }

    document.getElementById('micCircle')?.addEventListener('click', toggleListening);
    document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
    document.getElementById('messageInput')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
