version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3031:3001"   # 3031 = ngrok port, 3001 = container internal port
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - PORT=3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    container_name: clara-code-backend

  registry:
    image: verdaccio/verdaccio:6
    container_name: clara-registry
    ports:
      - "4873:4873"
    volumes:
      - ./registry/config.yaml:/verdaccio/conf/config.yaml:ro
      - ./registry/htpasswd:/verdaccio/htpasswd:ro
      - verdaccio_storage:/verdaccio/storage
    environment:
      - VERDACCIO_PORT=4873
    restart: unless-stopped

volumes:
  verdaccio_storage:
